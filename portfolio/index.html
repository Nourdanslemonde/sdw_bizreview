<head>
<meta charset="utf-8">

<title>경쟁사 포트폴리오 갭 · 잠금</title>
<style>
:root{--bg:#faf9fc;--fg:#1a1522;--muted:#6b6577;--acc:#4c2a85;--acc-fg:#fff;--card:#fff;--bd:#e5e0ee;--err:#b23046}
@media (prefers-color-scheme:dark){:root{--bg:#141019;--fg:#ece8f2;--muted:#9a92a8;--acc:#b39ae8;--acc-fg:#1a1522;--card:#1e1826;--bd:#2e2740}}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;display:grid;place-items:center;padding:24px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(76,42,133,.10)}
h1{font-size:19px;margin:0 0 4px;letter-spacing:-.01em}
.sub{color:var(--muted);font-size:13px;margin:0 0 24px}
label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}
input{width:100%;padding:12px 14px;font-size:15px;border:1px solid var(--bd);border-radius:10px;background:var(--bg);color:var(--fg);outline:none}
input:focus{border-color:var(--acc)}
button{width:100%;margin-top:16px;padding:12px;font-size:15px;font-weight:600;border:0;border-radius:10px;background:var(--acc);color:var(--acc-fg);cursor:pointer}
button:disabled{opacity:.6;cursor:default}
.err{color:var(--err);font-size:13px;margin:12px 0 0;min-height:18px}
.lock{font-size:26px;margin-bottom:12px}
</style>
</head>

    <p class="err" id="err" role="alert"></p>
  </form>
</div>

function b2u(b){var s=atob(b),u=new Uint8Array(s.length);for(var i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
async function unlock(pw){
  var enc=new TextEncoder();
  var base=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b2u(SALT),iterations:ITER,hash:"SHA-256"},
    base,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2u(IV)},key,b2u(CT));
  return new TextDecoder().decode(pt);
}
